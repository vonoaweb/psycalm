<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aparta — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clay: #C8553D;
      --clay-deep: #A53E2A;
      --clay-soft: #F1D5C7;
      --cream: #F4EBDD;
      --sage: #7B9E7E;
      --ink: #2A1F1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(42, 31, 26, 0.1);
      border: 1px solid #E8DDD0;
    }

    .logo {
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--clay);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .logo::before {
      content: '';
      width: 28px;
      height: 28px;
      background: var(--clay);
      border-radius: 8px 8px 8px 2px;
      display: inline-block;
    }

    .subtitle {
      color: #6B5E54;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6B5E54;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #E8DDD0;
      border-radius: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--clay);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.875rem;
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover {
      background: var(--clay-deep);
    }

    .error {
      background: #FEF2F2;
      color: #991B1B;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #9E9186;
    }

    @media (max-width: 480px) {
      .login-card { padding: 1.75rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Aparta</div>
    <p class="subtitle">Aparta tu cita. Cobra al instante.</p>

    <div class="error" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@aparta.mx" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="footer">Pagos protegidos por Stripe · Hecho con Aparta</p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('aparta_user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Error al iniciar sesión';
          errorEl.classList.add('show');
        }
      } catch (err) {
        errorEl.textContent = 'Error de conexión. Intentá de nuevo.';
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
